<!-- Usar en otros componentes:
 btnImg -> imagen del btn
 click -> pasarle evento
-->

<button
  type="button"
  class="btn btn-action"
  (click)="click()"
  style="--bs-btn-padding-y: 0.4rem; --bs-btn-padding-x: 0.4rem; --bs-btn-font-size: 1rem"
>
  <img [src]="btnImg" class="btn-img" />
</button>
