<!-- Para que este habilitado: id="flexSwitchCheckChecked" for='flexSwitchCheckChecked' -->
<!-- Para que este habilitado: id="flexSwitchCheckDefault" for='flexSwitchCheckDefault' -->
<div class="form-check form-switch">
  <input
    class="btn-switch form-check-input"
    type="checkbox"
    role="switch"
    id="flexSwitchCheckDefault"
    [checked]="checked"
    (change)="emitCheckedChange($event)"
  />
  {{ name }}
</div>
