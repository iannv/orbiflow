services:
  db:
    profiles: ["local"]
    image: postgres:16
    env_file:
      - .env.local
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend/coop
    volumes:
      - ./backend/coop:/app
    ports:
      - "8000:8000"
    env_file:
      - ${ENV_FILE:-.env.local}

  frontend:
    build:
      context: ./frontend/orbiflow
    volumes:
      - ./frontend/orbiflow:/app
      - /app/node_modules
    ports:
      - "4200:4200"
    depends_on:
      - backend

volumes:
  postgres_data:
