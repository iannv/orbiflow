name: OrbiFlow CI

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create temporary .env files for CI
        run: |
          echo "POSTGRES_DB=orbiflow_db" >> .env.local
          echo "POSTGRES_USER=admin" >> .env.local
          echo "POSTGRES_PASSWORD=admin_pass" >> .env.local
          echo "POSTGRES_HOST=db" >> .env.local
          echo "POSTGRES_PORT=5432" >> .env.local
          echo "DJANGO_SECRET_KEY=ci_test_key_placeholder" >> .env.local
          echo "DJANGO_DEBUG=true" >> .env.local
          cp .env.local .env

      - name: Build and Run Tests
        run: |
          # Primero construimos para asegurar que todo esté listo
          docker compose build
          # Corremos los tests usando el Makefile
          make tests